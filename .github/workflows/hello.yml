name: Hello World Pipeline

on: 
  push:
    branches: [main]

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Print Hello World
      run: echo "Hello, World!"

    - name: Show Current User
      run: whoami

    - name: List Files
      run: ls -la

    - name: Show Working Directory
      run: pwd